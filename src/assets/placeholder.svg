<svg xmlns="http://www.w3.org/2000/svg" width="220" height="260" viewBox="0 0 220 260">
  <!-- Background -->
  <rect width="220" height="260" fill="#d4d4cc"/>

  <!-- Ben-Day dots pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="rgba(10,10,10,0.15)"/>
    </pattern>
  </defs>
  <rect width="220" height="260" fill="url(#dots)"/>

  <!-- Body silhouette -->
  <ellipse cx="110" cy="85" rx="38" ry="42" fill="#3a3a36"/>
  <path d="M40 260 Q50 170 110 155 Q170 170 180 260 Z" fill="#3a3a36"/>

  <!-- Collar/shirt detail -->
  <path d="M82 145 Q110 165 138 145 L145 155 Q110 178 75 155 Z" fill="#0a0a0a"/>

  <!-- Jacket lapels (ink hatching) -->
  <line x1="95" y1="155" x2="65" y2="220" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="125" y1="155" x2="155" y2="220" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Comic cross-hatch shading on body -->
  <line x1="50" y1="180" x2="50" y2="260" stroke="#8a8a82" stroke-width="0.8" stroke-dasharray="2,6"/>
  <line x1="60" y1="175" x2="60" y2="260" stroke="#8a8a82" stroke-width="0.8" stroke-dasharray="2,6"/>
  <line x1="70" y1="172" x2="70" y2="260" stroke="#8a8a82" stroke-width="0.8" stroke-dasharray="2,6"/>
  <line x1="160" y1="172" x2="160" y2="260" stroke="#8a8a82" stroke-width="0.8" stroke-dasharray="2,6"/>
  <line x1="150" y1="175" x2="150" y2="260" stroke="#8a8a82" stroke-width="0.8" stroke-dasharray="2,6"/>
  <line x1="140" y1="180" x2="140" y2="260" stroke="#8a8a82" stroke-width="0.8" stroke-dasharray="2,6"/>

  <!-- "PHOTO" placeholder text -->
  <text x="110" y="235" text-anchor="middle" font-family="Courier Prime, Courier New, monospace"
    font-size="11" font-weight="700" letter-spacing="4" fill="#0a0a0a" opacity="0.5"
    text-decoration="none">[ PHOTO ]</text>

  <!-- Border -->
  <rect width="220" height="260" fill="none" stroke="#0a0a0a" stroke-width="3"/>
</svg>
